jobs:
  cat:
    cmd: "/usr/bin/cat ./test"
    numprocs: 1
    umask: 077
    workingdir: /home/kali/Documents/taskmaster/testing/cat
    autostart: false
    autorestart: false
    starttime: 1
    stopsignal: QUIT
    stoptime: 10
    stdout: /tmp/cat.out
    stderr: /tmp/cat.err

  cat_error:
    cmd: "/usr/bin/cat ./invalid_file"
    numprocs: 1
    umask: 077
    workingdir: /home/kali/Documents/taskmaster/testing/cat
    autostart: false
    autorestart: unexpected
    exitcodes: 0
    starttime: 1
    stopsignal: QUIT
    stoptime: 10
    stdout: /tmp/cat_error.out
    stderr: /tmp/cat_error.err

  bash_stoptime:
    cmd: "/usr/bin/bash"
    numprocs: 1
    umask: 077
    autostart: false
    autorestart: false
    starttime: 1
    stopsignal: INT
    stoptime: 3

  bash_show_env:
    cmd: "/usr/bin/bash -c env"
    numprocs: 1
    umask: 077
    autostart: false
    autorestart: false
    starttime: 1
    stopsignal: INT
    stoptime: 3
    env:
      TASKMASTER: CHEESSE
      MIEP: MOEP

  ls:
    cmd: "/usr/bin/ls"
    numprocs: 1
    umask: 077
    workingdir: /home/kali/Documents/taskmaster/build
    autostart: false
    autorestart: false
    exitcodes: 0
    starttime: 1
    stopsignal: QUIT
    stoptime: 10

  sleep_starting:
    cmd: "/usr/bin/sleep 100"
    numprocs: 1
    umask: 077
    autostart: false
    autorestart: false
    exitcodes: 0
    starttime: 10
    stopsignal: TERM
    stoptime: 10

  sleep_restarting:
    cmd: "/usr/bin/sleep 5"
    numprocs: 1
    umask: 077
    autostart: false
    autorestart: true
    exitcodes: 0
    starttime: 2
    stopsignal: QUIT
    stoptime: 10

  touch:
    cmd: "/usr/bin/touch miep"
    numprocs: 1
    umask: 777
    workingdir: /tmp
    autostart: false
    autorestart: false
    exitcodes: 0
    starttime: 0
    stopsignal: QUIT
    stoptime: 10
    stderr: /tmp/vgsworker.stderr